name: Build Installer

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:\LLVM-22.1
          key: llvm-22.1.0-win64

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-win64.exe"
          $output = "$env:TEMP\LLVM-setup.exe"
          Write-Host "Downloading LLVM 22.1.0..."
          curl.exe -L -o $output $url
          if (-not (Test-Path $output)) {
            Write-Host "::error::Download failed. Trying alternate URL..."
            $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-win64.exe"
            curl.exe -L -o $output $url
          }
          if (Test-Path $output) {
            Write-Host "Installing LLVM..."
            Start-Process -FilePath $output -ArgumentList "/S /D=C:\LLVM-22.1" -Wait -NoNewWindow
          } else {
            Write-Host "::error::Could not download LLVM. Please update the URL."
            exit 1
          }
        shell: pwsh

      - name: Set LLVM env
        run: |
          if (Test-Path "C:\LLVM-22.1\bin\llvm-config.exe") {
            $ver = & "C:\LLVM-22.1\bin\llvm-config.exe" --version
            Add-Content -Path $env:GITHUB_ENV -Value "LLVM_SYS_221_PREFIX=C:\LLVM-22.1"
            Add-Content -Path $env:GITHUB_ENV -Value "LLVM_DIR=C:\LLVM-22.1"
            Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=C:\LLVM-22.1\bin"
            Write-Host "LLVM $ver ready at C:\LLVM-22.1"
          } else {
            Write-Host "::error::LLVM not found at C:\LLVM-22.1"
            exit 1
          }
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Build release
        run: cargo build --release --features llvm
        shell: pwsh
        env:
          LLVM_SYS_221_PREFIX: ${{ env.LLVM_SYS_221_PREFIX }}

      - name: Copy LLVM DLLs
        run: |
          Copy-Item "$env:LLVM_DIR\bin\LLVM-C.dll" target\release\ -ErrorAction SilentlyContinue
          Copy-Item "$env:LLVM_DIR\bin\clang.exe" target\release\ -ErrorAction SilentlyContinue
          Copy-Item "$env:LLVM_DIR\bin\lld.exe" target\release\ -ErrorAction SilentlyContinue
        shell: pwsh
        continue-on-error: true

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AzuriteLang-installer
          path: installer\output\*.exe
