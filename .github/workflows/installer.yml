name: Build Installer

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          choco install llvm --version=22.1.0 --force -y --ignore-checksums
          # Find where chocolatey installed LLVM
          $llvmPaths = @(
            "C:\Program Files\LLVM",
            "C:\tools\llvm",
            "$env:ChocolateyInstall\lib\llvm\tools"
          )
          $llvmDir = $null
          foreach ($p in $llvmPaths) {
            if (Test-Path "$p\bin\llvm-config.exe") {
              $llvmDir = $p; break
            }
          }
          if (-not $llvmDir) {
            $llvmDir = (Get-ChildItem -Path "C:\Program Files" -Filter "LLVM*" -Directory | Select-Object -First 1).FullName
          }
          if ($llvmDir) {
            Add-Content -Path $env:GITHUB_ENV -Value "LLVM_SYS_221_PREFIX=$llvmDir"
            Add-Content -Path $env:GITHUB_ENV -Value "LLVM_DIR=$llvmDir"
            Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvmDir\bin"
            Write-Host "LLVM found at: $llvmDir"
          } else {
            Write-Host "::error::LLVM not found after installation"
            exit 1
          }
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Build release
        run: cargo build --release --features llvm
        shell: pwsh
        env:
          LLVM_SYS_221_PREFIX: ${{ env.LLVM_SYS_221_PREFIX }}

      - name: Copy LLVM DLLs
        run: |
          Copy-Item "$env:LLVM_DIR\bin\LLVM-C.dll" target\release\ -ErrorAction SilentlyContinue
          Copy-Item "$env:LLVM_DIR\bin\clang.exe" target\release\ -ErrorAction SilentlyContinue
          Copy-Item "$env:LLVM_DIR\bin\lld.exe" target\release\ -ErrorAction SilentlyContinue
        shell: pwsh
        continue-on-error: true

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AzuriteLang-installer
          path: installer\output\*.exe
